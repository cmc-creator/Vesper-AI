[phases.setup]
nixPkgs = ["chromium", "nss", "nspr", "atk", "cups", "dbus", "libdrm", "mesa", "libxkbcommon", "pango", "cairo", "alsa-lib"]

[phases.install]
cmds = ["pip install -r backend/requirements.txt", "playwright install chromium --with-deps || true"]

[start]
cmd = "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
